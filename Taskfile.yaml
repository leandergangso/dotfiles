version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  stow:
    desc: Link selected packages (task stow -- zsh nvim)
    cmds:
      - stow {{.CLI_ARGS}}

  stow:restow:
    desc: Relink selected packages and remove stale links
    cmds:
      - stow --restow {{.CLI_ARGS}}

  stow:delete:
    desc: Unlink selected packages
    cmds:
      - stow --delete {{.CLI_ARGS}}

  stow:adopt:
    desc: Adopt conflicting files, then review git diff
    cmds:
      - stow --adopt {{.CLI_ARGS}}

  stow:all:
    desc: Link every package under stow/
    cmds:
      - find stow -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | xargs -r stow

  arch:yay:
    desc: Install yay when it is missing
    cmds:
      - ./arch/setup-yay.sh

  arch:install:
    desc: Install official and AUR package manifests
    cmds:
      - ./arch/install-packages.sh

  arch:export:
    desc: Backup and export package manifests
    cmds:
      - ./arch/export-packages.sh

  nix:install:
    desc: Install the root CLI profile
    cmds:
      - nix profile add .#default

  nix:neovim:
    desc: Install or upgrade Neovim tools (LSPs and formatters)
    cmds:
      - nix profile add ./nvim/.config/nvim#default

  nix:update:
    desc: Update the root flake inputs
    cmds:
      - nix flake update

  nix:check:
    desc: Evaluate the root flake outputs without building them
    cmds:
      - nix flake check --no-build
