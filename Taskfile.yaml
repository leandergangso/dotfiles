version: "3"

tasks:
  default:
    desc: Show the task list
    cmds:
      - task --list

  stow:
    desc: Link selected packages from stow/
    cmds:
      - stow {{.CLI_ARGS}}

  stow:restow:
    desc: Recreate selected links after package changes
    cmds:
      - stow --restow {{.CLI_ARGS}}

  stow:delete:
    desc: Remove selected package links
    cmds:
      - stow --delete {{.CLI_ARGS}}

  stow:adopt:
    desc: Move conflicting files into a package
    cmds:
      - stow --adopt {{.CLI_ARGS}}

  stow:all:
    desc: Link every package under stow/
    cmds:
      - find stow -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | xargs -r stow

  arch:yay:
    desc: Bootstrap yay when it is missing
    cmds:
      - ./arch/setup-yay.sh

  arch:install:
    desc: Install packages listed in arch/packages/
    cmds:
      - ./arch/install-packages.sh

  arch:export:
    desc: Snapshot the current package manifests
    cmds:
      - ./arch/export-packages.sh

  nvim:backup:
    desc: Back up Neovim's local data
    cmds:
      - ./scripts/nvim-backup.sh

  nvim:archive:
    desc: Archive Neovim config and local data for offline use
    cmds:
      - ./scripts/nvim-archive.sh {{.CLI_ARGS}}
